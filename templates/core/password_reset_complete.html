{% extends 'base.html' %}

{% block title %}Password Reset Complete - DM Design{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4 text-center">
        <div class="mb-4">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.5">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        </div>
        <h2 class="mb-2">Password Reset Complete</h2>
        <p class="text-muted mb-4">Your password has been set. You may now log in.</p>
        <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-4">Log In</a>
    </div>
</div>
{% endblock %}
