{% extends 'base.html' %}

{% block title %}Password Reset - DM Design{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <h2 class="mb-2">Reset Password</h2>
            <p class="text-muted">Enter your email to receive reset instructions</p>
        </div>
        <div class="card dashboard-card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_email" class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg" id="id_email" placeholder="your@email.com" required>
                    </div>
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">
                            Send Reset Link
                        </button>
                    </div>
                </form>
                <div class="text-center">
                    <p class="text-muted mb-0"><a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
