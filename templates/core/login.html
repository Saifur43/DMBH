{% extends 'base.html' %}

{% block title %}Login - DM Design{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <h2 class="mb-2">Welcome Back</h2>
            <p class="text-muted">Sign in to access your dashboard</p>
        </div>
        <div class="card dashboard-card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg" id="username" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" id="password" placeholder="Enter your password" required>
                    </div>
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">
                            Sign In
                        </button>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
                <div class="text-center">
                    <p class="text-muted mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-medium" style="color: var(--accent-gold-dark);">Create one</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
